<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裁判費與利息計算小工具</title>
    <!-- 引入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 來解析 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- 內建 SVG 圖示元件 (取代外部引入) ---
        const Scale = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>);
        const CalculatorIcon = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/></svg>);
        const FileText = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>);
        const ChevronRight = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>);
        const Info = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>);
        const ArrowDownToLine = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>);
        const Trash2 = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);

        // --- 輔助計算函式 ---
        const diffDaysInclusive = (d1, d2) => {
            const utc1 = Date.UTC(d1.getFullYear(), d1.getMonth(), d1.getDate());
            const utc2 = Date.UTC(d2.getFullYear(), d2.getMonth(), d2.getDate());
            return Math.floor((utc2 - utc1) / 86400000) + 1;
        };

        const getPeriodEndInclusive = (startDate, addMonths) => {
            let targetMonth = startDate.getMonth() + addMonths;
            let targetYear = startDate.getFullYear() + Math.floor(targetMonth / 12);
            targetMonth = targetMonth % 12;
            if (targetMonth < 0) targetMonth += 12;

            let startDay = startDate.getDate();
            let maxDaysInTargetMonth = new Date(targetYear, targetMonth + 1, 0).getDate();

            if (startDay > maxDaysInTargetMonth) {
                return new Date(targetYear, targetMonth, maxDaysInTargetMonth);
            } else {
                let targetDate = new Date(targetYear, targetMonth, startDay);
                targetDate.setDate(targetDate.getDate() - 1);
                return targetDate;
            }
        };

        // --- 資料字典：聲請事件清單 ---
        const MOTION_EVENTS = [
            { group: '500元', items: [
                '聲請迴避', '聲請通知受擔保利益人行使權利', '聲請變換提存物或保證書', 
                '對於法院書記官之處分提出異議', '聲請發支付命令', 
                '聲請命假扣押、假處分、定暫時狀態處分之債權人於一定期間內起訴'
            ], fee: 500 },
            { group: '1,000元', items: [
                '聲請參加訴訟或駁回參加', '聲請命返還提存物或保證書', '聲請回復原狀',
                '對於司法事務官之處分提出異議', '聲請許可承當訴訟',
                '聲請許可為訴訟繫屬事實登記或撤銷許可登記裁定', '起訴前聲請證據保全',
                '依第484條第1項但書、第485條第1項但書、第486條第2項但書，提出異議',
                '聲請假扣押、假處分或撤銷假扣押、假處分裁定', '聲請公示催告或除權判決'
            ], fee: 1000 },
            { group: '3,000元', items: [
                '聲請定暫時狀態處分或撤銷定暫時狀態處分裁定'
            ], fee: 3000 }
        ];

        function App() {
            // --- 狀態管理：主要表單 ---
            const [mainCategory, setMainCategory] = useState('lawsuit'); 
            const [subCategory, setSubCategory] = useState('property'); 
            const [amountInput, setAmountInput] = useState('');
            const [instanceLevel, setInstanceLevel] = useState('1');
            const [selectedMotion, setSelectedMotion] = useState('');

            // --- 狀態管理：利息計算專用 ---
            const [interestPrincipal, setInterestPrincipal] = useState('');
            const [interestRate, setInterestRate] = useState('');
            const [rateType, setRateType] = useState('annual'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            // --- 狀態管理：小算盤 ---
            const [calcDisplay, setCalcDisplay] = useState('0');
            const [calcPrevValue, setCalcPrevValue] = useState(null);
            const [calcOperator, setCalcOperator] = useState(null);
            const [calcWaiting, setCalcWaiting] = useState(false);

            // --- 處理輸入 ---
            const handleAmountChange = (e) => setAmountInput(e.target.value.replace(/\D/g, ''));
            const handlePrincipalChange = (e) => setInterestPrincipal(e.target.value.replace(/\D/g, ''));
            const handleRateChange = (e) => setInterestRate(e.target.value.replace(/[^0-9.]/g, '')); 

            // --- 小算盤邏輯 ---
            const inputNum = (num) => {
                if (calcWaiting) {
                    setCalcDisplay(String(num));
                    setCalcWaiting(false);
                } else {
                    setCalcDisplay(calcDisplay === '0' ? String(num) : calcDisplay + num);
                }
            };
            const inputDot = () => {
                if (calcWaiting) {
                    setCalcDisplay('0.');
                    setCalcWaiting(false);
                } else if (!calcDisplay.includes('.')) {
                    setCalcDisplay(calcDisplay + '.');
                }
            };
            const clearCalc = () => {
                setCalcDisplay('0');
                setCalcPrevValue(null);
                setCalcOperator(null);
                setCalcWaiting(false);
            };
            const operate = (op) => {
                const current = parseFloat(calcDisplay);
                if (calcPrevValue === null) {
                    setCalcPrevValue(current);
                } else if (calcOperator && !calcWaiting) {
                    const prev = calcPrevValue;
                    let result = prev;
                    if (calcOperator === '+') result = prev + current;
                    if (calcOperator === '-') result = prev - current;
                    if (calcOperator === '×') result = prev * current;
                    if (calcOperator === '÷') result = prev / current;
                    result = parseFloat(result.toFixed(10)); 
                    setCalcDisplay(String(result));
                    setCalcPrevValue(result);
                }
                setCalcWaiting(true);
                setCalcOperator(op);
            };
            const calcEquals = () => {
                if (!calcOperator || calcPrevValue === null) return;
                const current = parseFloat(calcDisplay);
                const prev = calcPrevValue;
                let result = prev;
                if (calcOperator === '+') result = prev + current;
                if (calcOperator === '-') result = prev - current;
                if (calcOperator === '×') result = prev * current;
                if (calcOperator === '÷') result = prev / current;
                result = parseFloat(result.toFixed(10));
                setCalcDisplay(String(result));
                setCalcPrevValue(null);
                setCalcOperator(null);
                setCalcWaiting(true);
            };
            const loadToCalculator = (amount) => {
                setCalcDisplay(String(amount));
                setCalcPrevValue(null);
                setCalcOperator(null);
                setCalcWaiting(true);
            };

            // --- 計算邏輯 ---
            const calculationResult = useMemo(() => {
                const amount = parseInt(amountInput, 10) || 0;
                let fee = 0;
                let details = [];

                const parseLocalDate = (dateStr) => {
                    const [y, m, d] = dateStr.split('-');
                    return new Date(Number(y), Number(m) - 1, Number(d));
                };

                switch (mainCategory) {
                    case 'lawsuit':
                        if (subCategory === 'non-property') {
                            fee = instanceLevel === '1' ? 4500 : 6750;
                            details.push(`非因財產權起訴/上訴 (${instanceLevel === '1' ? '第一審' : '第二、三審'})：${fee.toLocaleString()}元`);
                        } else if (subCategory === 'property') {
                            if (amount === 0) return null; 
                            const isFirst = instanceLevel === '1';
                            const baseFee = isFirst ? 1500 : 2250;
                            if (amount <= 100000) {
                                fee = baseFee;
                                details.push(`10萬元以下基本費：${fee.toLocaleString()}元`);
                            } else {
                                fee = baseFee;
                                details.push(`10萬元以下基本費：${baseFee.toLocaleString()}元`);
                                const brackets = [
                                    [100000, 1000000, 130, 195, '10萬~100萬'],
                                    [1000000, 10000000, 117, 175.5, '100萬~1000萬'],
                                    [10000000, 100000000, 88, 132, '1000萬~1億'],
                                    [100000000, 1000000000, 77, 115.5, '1億~10億'],
                                    [1000000000, Infinity, 66, 99, '10億以上']
                                ];
                                brackets.forEach(b => {
                                    const [min, max, rate1, rate2, label] = b;
                                    if (amount > min) {
                                        const applicableAmount = Math.min(amount, max) - min;
                                        const units = Math.ceil(applicableAmount / 10000); 
                                        const rate = isFirst ? rate1 : rate2;
                                        const tierFee = units * rate;
                                        fee += tierFee;
                                        details.push(`逾${label}部分 (計 ${units} 萬)：${units} 萬 × ${rate}元 = ${tierFee.toLocaleString()}元`);
                                    }
                                });
                                fee = Math.round(fee);
                            }
                        }
                        break;

                    case 'interest':
                        if (!interestPrincipal || !interestRate || !startDate || !endDate) return null;
                        const p = parseFloat(interestPrincipal);
                        const r = parseFloat(interestRate) / 100;
                        let sDate = parseLocalDate(startDate);
                        let eDate = parseLocalDate(endDate);
                        
                        if (sDate > eDate) return { error: '⚠️ 起算日不可晚於終止日' };

                        const twYearS = sDate.getFullYear() - 1911;
                        const twYearE = eDate.getFullYear() - 1911;
                        details.push(`計算本金：${p.toLocaleString()}元`);
                        details.push(`給付期間：民國 ${twYearS} 年 ${sDate.getMonth()+1} 月 ${sDate.getDate()} 日 至 民國 ${twYearE} 年 ${eDate.getMonth()+1} 月 ${eDate.getDate()} 日`);

                        if (rateType === 'annual') {
                            let fullYears = 0;
                            while (true) {
                                let equivEnd = getPeriodEndInclusive(sDate, (fullYears + 1) * 12);
                                if (equivEnd <= eDate) {
                                    fullYears++;
                                } else {
                                    break;
                                }
                            }

                            let partialBase = 0;
                            let partialDays = 0;
                            let yearDays = 0;
                            let currentStart = new Date(sDate);

                            if (fullYears > 0) {
                                let lastEquivEnd = getPeriodEndInclusive(sDate, fullYears * 12);
                                currentStart = new Date(lastEquivEnd);
                                currentStart.setDate(currentStart.getDate() + 1);
                            }

                            if (currentStart <= eDate) {
                                partialDays = diffDaysInclusive(currentStart, eDate);
                                let nextEquivEnd = getPeriodEndInclusive(currentStart, 12);
                                yearDays = diffDaysInclusive(currentStart, nextEquivEnd);
                                partialBase = partialDays / yearDays;
                            }

                            const totalBase = fullYears + partialBase;
                            const interest = p * totalBase * r;

                            details.push(`計息方式：年息 ${interestRate}%`);
                            if (fullYears > 0) details.push(`給付期間足年部分：${fullYears} 年`);
                            if (partialDays > 0) {
                                const twCurrentY = currentStart.getFullYear() - 1911;
                                details.push(`給付期間不足年部分：${partialDays} 日 / ${yearDays} 日`);
                                details.push(`(區間：${twCurrentY}.${currentStart.getMonth()+1}.${currentStart.getDate()} ~ ${twYearE}.${eDate.getMonth()+1}.${eDate.getDate()}，首尾均計入共 ${partialDays} 日)`);
                            }
                            
                            let baseFractionStr = fullYears > 0 && partialDays > 0 
                                ? `${fullYears} 又 ${partialDays}/${yearDays}` 
                                : (partialDays > 0 ? `${partialDays}/${yearDays}` : `${fullYears}`);

                            details.push(`給付基數：${baseFractionStr} (約 ${totalBase.toFixed(6)})`);
                            details.push(`利息小計：${p.toLocaleString()} × ${baseFractionStr} × ${interestRate}% = ${Math.round(interest).toLocaleString()}元`);
                            
                            fee = p + Math.round(interest);
                            details.push(`---------------------------`);
                            details.push(`總計給付金額(本金+利息)：${fee.toLocaleString()}元`);

                        } else if (rateType === 'monthly') {
                            let fullMonths = 0;
                            while (true) {
                                let equivEnd = getPeriodEndInclusive(sDate, fullMonths + 1);
                                if (equivEnd <= eDate) {
                                    fullMonths++;
                                } else {
                                    break;
                                }
                            }
                            
                            const interest = p * fullMonths * r;
                            details.push(`計息方式：月息 ${interestRate}%`);
                            details.push(`給付期間 (不足一月者不計)：共 ${fullMonths} 個月`);
                            details.push(`利息小計：${p.toLocaleString()} × ${fullMonths} × ${interestRate}% = ${Math.round(interest).toLocaleString()}元`);
                            
                            fee = p + Math.round(interest);
                            details.push(`---------------------------`);
                            details.push(`總計給付金額(本金+利息)：${fee.toLocaleString()}元`);
                        }
                        break;

                    case 'motion':
                        if (!selectedMotion) return null;
                        const matchedMotion = MOTION_EVENTS.flatMap(g => g.items.map(item => ({ item, fee: g.fee }))).find(m => m.item === selectedMotion);
                        if (matchedMotion) {
                            fee = matchedMotion.fee;
                            details.push(`聲請事件：${selectedMotion}`);
                            details.push(`固定規費：${fee.toLocaleString()}元`);
                        }
                        break;

                    case 'mediation':
                        if (subCategory === 'non-property') {
                            fee = 0;
                            details.push('非財產權事件聲請調解：免徵');
                        } else {
                            if (amountInput === '') return null;
                            if (amount < 100000) { fee = 0; details.push('未滿10萬元：免徵'); }
                            else if (amount < 1000000) { fee = 1000; details.push('10萬元以上～未滿100萬元：1,000元'); }
                            else if (amount < 5000000) { fee = 2000; details.push('100萬元以上～未滿500萬元：2,000元'); }
                            else if (amount < 10000000) { fee = 3000; details.push('500萬元以上～未滿1000萬元：3,000元'); }
                            else { fee = 5000; details.push('1000萬元以上：5,000元'); }
                        }
                        break;

                    case 'execution':
                        if (subCategory === 'non-property') {
                            fee = 3000;
                            details.push('非財產權案件執行費：3,000元');
                        } else if (subCategory === 'cert') {
                            fee = 1000;
                            details.push('依強制執行法第27條第2項逕行發給債權憑證：1,000元');
                            details.push('※註：若依計算標準應徵收執行費低於1,000元者，依該計算金額徵收。');
                        } else {
                            if (amountInput === '') return null;
                            if (amount < 5000) {
                                fee = 0;
                                details.push('未滿5,000元：免徵');
                            } else {
                                const units = Math.ceil(amount / 100); 
                                fee = Math.round(units * 0.8);
                                details.push(`執行標的金額：${amount.toLocaleString()}元`);
                                details.push(`計算基準 (每百元0.8元，不滿百元以百元計)：計 ${units} 百元`);
                                details.push(`${units} × 0.8 = ${fee.toLocaleString()}元`);
                            }
                        }
                        break;

                    case 'other':
                        fee = 1500;
                        details.push(`${subCategory === 'appeal' ? '抗告 / 再為抗告' : '聲請再審'}：1,500元`);
                        break;
                }

                return { total: fee, details };
            }, [mainCategory, subCategory, amountInput, instanceLevel, selectedMotion, interestPrincipal, interestRate, rateType, startDate, endDate]);

            // --- UI 元件區塊 ---
            return (
                <div className="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8 font-sans text-gray-800 flex flex-col lg:flex-row gap-6 items-start justify-center">
                    
                    {/* 左側主要計算區塊 */}
                    <div className="w-full max-w-3xl space-y-6">
                        
                        <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 flex items-center gap-4">
                            <div className="p-3 bg-blue-100 rounded-lg text-blue-600 flex-shrink-0">
                                <Scale className="w-8 h-8" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">裁判費及利息計算小工具</h1>
                                <p className="text-sm text-gray-500 mt-1">依照司法院收費標準及民法利息規定計算</p>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                            <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span>
                                請選擇起訴 / 聲請方式
                            </h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {[
                                    { id: 'lawsuit', label: '起訴 / 上訴' },
                                    { id: 'motion', label: '聲請事件' },
                                    { id: 'mediation', label: '聲請調解' },
                                    { id: 'execution', label: '聲請強制執行' },
                                    { id: 'other', label: '抗告 / 再審' },
                                    { id: 'interest', label: '利息計算' }, 
                                ].map((cat) => (
                                    <button
                                        key={cat.id}
                                        onClick={() => {
                                            setMainCategory(cat.id);
                                            setAmountInput(''); 
                                            if(cat.id === 'lawsuit') setSubCategory('property');
                                            if(cat.id === 'motion') setSelectedMotion('');
                                            if(cat.id === 'mediation') setSubCategory('property');
                                            if(cat.id === 'execution') setSubCategory('property');
                                            if(cat.id === 'other') setSubCategory('appeal');
                                        }}
                                        className={`py-3 px-4 rounded-xl border text-sm font-medium transition-all ${
                                            mainCategory === cat.id 
                                                ? 'border-blue-600 bg-blue-50 text-blue-700 ring-1 ring-blue-600' 
                                                : 'border-gray-200 bg-white text-gray-600 hover:bg-gray-50'
                                        }`}
                                    >
                                        {cat.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                            <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>
                                輸入案件細節
                            </h2>
                            
                            <div className="space-y-6">
                                
                                {mainCategory === 'interest' && (
                                    <div className="space-y-5">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">計算本金 (新台幣)</label>
                                                <div className="relative">
                                                    <input 
                                                        type="text" 
                                                        value={interestPrincipal}
                                                        onChange={handlePrincipalChange}
                                                        placeholder="請輸入本金"
                                                        className="w-full rounded-lg border-gray-300 border p-2.5 pl-8 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                    />
                                                    <span className="absolute left-3 top-2.5 text-gray-400">$</span>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">利息利率 (%)</label>
                                                <div className="relative flex">
                                                    <input 
                                                        type="text" 
                                                        value={interestRate}
                                                        onChange={handleRateChange}
                                                        placeholder="例如: 5"
                                                        className="w-full rounded-l-lg border-gray-300 border border-r-0 p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                    />
                                                    <select 
                                                        value={rateType}
                                                        onChange={(e) => setRateType(e.target.value)}
                                                        className="rounded-r-lg border-gray-300 border bg-gray-50 p-2.5 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                    >
                                                        <option value="annual">年息</option>
                                                        <option value="monthly">月息</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">起算日 (均計入)</label>
                                                <input 
                                                    type="date" 
                                                    value={startDate}
                                                    onChange={(e) => setStartDate(e.target.value)}
                                                    className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">終止日 (均計入)</label>
                                                <input 
                                                    type="date" 
                                                    value={endDate}
                                                    onChange={(e) => setEndDate(e.target.value)}
                                                    className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {mainCategory === 'lawsuit' && (
                                    <div className="space-y-4">
                                        <div className="flex gap-4">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'property'} onChange={() => setSubCategory('property')} className="text-blue-600 focus:ring-blue-500" />
                                                因財產權
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'non-property'} onChange={() => setSubCategory('non-property')} className="text-blue-600 focus:ring-blue-500" />
                                                非因財產權
                                            </label>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">審級</label>
                                                <select 
                                                    value={instanceLevel} 
                                                    onChange={(e) => setInstanceLevel(e.target.value)}
                                                    className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                >
                                                    <option value="1">第一審</option>
                                                    <option value="23">第二、三審</option>
                                                </select>
                                            </div>
                                            
                                            {subCategory === 'property' && (
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">訴訟標的金額 (新台幣)</label>
                                                    <div className="relative">
                                                        <input 
                                                            type="text" 
                                                            value={amountInput}
                                                            onChange={handleAmountChange}
                                                            placeholder="例如: 130000"
                                                            className="w-full rounded-lg border-gray-300 border p-2.5 pl-8 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                        />
                                                        <span className="absolute left-3 top-2.5 text-gray-400">$</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {mainCategory === 'motion' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">請選擇聲請事件種類</label>
                                        <select 
                                            value={selectedMotion} 
                                            onChange={(e) => setSelectedMotion(e.target.value)}
                                            className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                        >
                                            <option value="" disabled>-- 請選擇 --</option>
                                            {MOTION_EVENTS.map((group, idx) => (
                                                <optgroup key={idx} label={`【${group.group}】`}>
                                                    {group.items.map((item, i) => (
                                                        <option key={i} value={item}>{item}</option>
                                                    ))}
                                                </optgroup>
                                            ))}
                                        </select>
                                    </div>
                                )}

                                {mainCategory === 'mediation' && (
                                    <div className="space-y-4">
                                        <div className="flex gap-4">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'property'} onChange={() => setSubCategory('property')} className="text-blue-600 focus:ring-blue-500" />
                                                財產權事件
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'non-property'} onChange={() => setSubCategory('non-property')} className="text-blue-600 focus:ring-blue-500" />
                                                非財產權事件
                                            </label>
                                        </div>
                                        {subCategory === 'property' && (
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">標的金額 (新台幣)</label>
                                                <div className="relative">
                                                    <input 
                                                        type="text" 
                                                        value={amountInput}
                                                        onChange={handleAmountChange}
                                                        placeholder="請輸入金額"
                                                        className="w-full rounded-lg border-gray-300 border p-2.5 pl-8 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                    />
                                                    <span className="absolute left-3 top-2.5 text-gray-400">$</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {mainCategory === 'execution' && (
                                    <div className="space-y-4">
                                        <div className="flex flex-col sm:flex-row gap-3">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'property'} onChange={() => setSubCategory('property')} className="text-blue-600 focus:ring-blue-500" />
                                                財產權案件
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'non-property'} onChange={() => setSubCategory('non-property')} className="text-blue-600 focus:ring-blue-500" />
                                                非財產權案件
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={subCategory === 'cert'} onChange={() => setSubCategory('cert')} className="text-blue-600 focus:ring-blue-500" />
                                                逕行發給債權憑證
                                            </label>
                                        </div>
                                        {subCategory === 'property' && (
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">執行標的金額 (新台幣)</label>
                                                <div className="relative">
                                                    <input 
                                                        type="text" 
                                                        value={amountInput}
                                                        onChange={handleAmountChange}
                                                        placeholder="請輸入金額"
                                                        className="w-full rounded-lg border-gray-300 border p-2.5 pl-8 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                    />
                                                    <span className="absolute left-3 top-2.5 text-gray-400">$</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {mainCategory === 'other' && (
                                    <div className="flex gap-6">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" checked={subCategory === 'appeal'} onChange={() => setSubCategory('appeal')} className="text-blue-600 focus:ring-blue-500" />
                                            抗告 / 再為抗告
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" checked={subCategory === 'retrial'} onChange={() => setSubCategory('retrial')} className="text-blue-600 focus:ring-blue-500" />
                                            聲請再審
                                        </label>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl shadow-lg p-6 text-white relative overflow-hidden">
                            <CalculatorIcon className="absolute -right-4 -bottom-4 w-32 h-32 text-gray-700 opacity-50" />
                            
                            <h2 className="text-lg font-semibold text-gray-300 mb-2">
                                {mainCategory === 'interest' ? '給付總額試算：' : '應徵收裁判 / 規費：'}
                            </h2>
                            
                            {calculationResult ? (
                                calculationResult.error ? (
                                    <div className="py-6 text-center text-red-400 font-medium relative z-10">
                                        {calculationResult.error}
                                    </div>
                                ) : (
                                    <div className="relative z-10">
                                        <div className="text-4xl md:text-5xl font-bold text-yellow-400 mb-4 flex items-baseline gap-2">
                                            NT$ {calculationResult.total.toLocaleString()}
                                            <span className="text-lg font-normal text-gray-400">元</span>
                                        </div>

                                        <button 
                                            onClick={() => loadToCalculator(calculationResult.total)}
                                            className="mb-6 flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition shadow-md"
                                        >
                                            <ArrowDownToLine className="w-4 h-4" /> 將結果帶入小算盤計算
                                        </button>
                                        
                                        <div className="bg-gray-800/80 rounded-xl p-4 border border-gray-700">
                                            <h3 className="text-sm font-medium text-gray-400 mb-2 flex items-center gap-1">
                                                <Info className="w-4 h-4" /> 計算明細
                                            </h3>
                                            <ul className="space-y-1.5 text-sm text-gray-200">
                                                {calculationResult.details.map((detail, idx) => (
                                                    <li key={idx} className="flex items-start gap-2">
                                                        <ChevronRight className="w-4 h-4 mt-0.5 text-blue-400 flex-shrink-0" />
                                                        <span className="leading-relaxed">{detail}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                )
                            ) : (
                                <div className="py-8 text-center text-gray-400 relative z-10">
                                    <FileText className="w-12 h-12 mx-auto mb-3 opacity-50" />
                                    <p>請完成上方設定與數值輸入以檢視結果</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 右側 / 底部 小算盤區塊 */}
                    <div className="w-full lg:w-80 shrink-0">
                        <div className="bg-[#1e1e1e] rounded-3xl shadow-xl p-5 text-white sticky top-8">
                            <div className="flex items-center gap-2 text-gray-300 mb-4 px-2">
                                <CalculatorIcon className="w-5 h-5 text-blue-400" />
                                <span className="font-medium">小算盤</span>
                            </div>

                            <div className="bg-[#2d2d2d] rounded-2xl p-4 text-right mb-4 border border-[#3d3d3d] min-h-[90px] flex flex-col justify-end">
                                {calcPrevValue !== null && calcOperator && (
                                    <div className="text-gray-400 text-sm mb-1 font-mono">
                                        {calcPrevValue} {calcOperator} {calcWaiting ? '' : calcDisplay}
                                    </div>
                                )}
                                <div className="text-4xl font-mono tracking-wider overflow-hidden text-ellipsis truncate">
                                    {calcDisplay}
                                </div>
                            </div>

                            <div className="grid grid-cols-4 gap-3 font-mono text-lg">
                                <button onClick={clearCalc} className="col-span-2 bg-red-500/20 text-red-400 hover:bg-red-500/30 rounded-xl py-3 font-semibold transition flex justify-center items-center gap-2">
                                    <Trash2 className="w-4 h-4" /> AC
                                </button>
                                <button onClick={() => operate('÷')} className={`bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-xl py-3 font-semibold transition ${calcOperator === '÷' && calcWaiting ? 'ring-2 ring-blue-500' : ''}`}>÷</button>
                                <button onClick={() => operate('×')} className={`bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-xl py-3 font-semibold transition ${calcOperator === '×' && calcWaiting ? 'ring-2 ring-blue-500' : ''}`}>×</button>

                                {[7, 8, 9].map(num => (
                                    <button key={num} onClick={() => inputNum(num)} className="bg-[#3d3d3d] hover:bg-[#4d4d4d] rounded-xl py-3 transition">{num}</button>
                                ))}
                                <button onClick={() => operate('-')} className={`bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-xl py-3 font-semibold transition ${calcOperator === '-' && calcWaiting ? 'ring-2 ring-blue-500' : ''}`}>-</button>

                                {[4, 5, 6].map(num => (
                                    <button key={num} onClick={() => inputNum(num)} className="bg-[#3d3d3d] hover:bg-[#4d4d4d] rounded-xl py-3 transition">{num}</button>
                                ))}
                                <button onClick={() => operate('+')} className={`bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-xl py-3 font-semibold transition ${calcOperator === '+' && calcWaiting ? 'ring-2 ring-blue-500' : ''}`}>+</button>

                                {[1, 2, 3].map(num => (
                                    <button key={num} onClick={() => inputNum(num)} className="bg-[#3d3d3d] hover:bg-[#4d4d4d] rounded-xl py-3 transition">{num}</button>
                                ))}
                                <button onClick={calcEquals} className="bg-yellow-500/90 hover:bg-yellow-400 text-gray-900 rounded-xl py-3 font-bold transition row-span-2 flex items-center justify-center text-2xl">=</button>

                                <button onClick={() => inputNum(0)} className="col-span-2 bg-[#3d3d3d] hover:bg-[#4d4d4d] rounded-xl py-3 transition">0</button>
                                <button onClick={inputDot} className="bg-[#3d3d3d] hover:bg-[#4d4d4d] rounded-xl py-3 transition font-bold">.</button>
                            </div>
                        </div>
                    </div>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

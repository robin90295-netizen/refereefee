<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 maximum-scale=1.0 輔助防止部分瀏覽器過度縮放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裁判費與利息計算</title>
    
    <!-- Open Graph 標籤：優化社群分享預覽 (LINE, FB, Discord 等) -->
    <meta property="og:title" content="裁判費與利息計算小工具">
    <meta property="og:description" content="提供快速計算民事訴訟裁判費、聲請費、執行費與利息的實用工具。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&q=80&w=1200&h=630">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans selection:bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- 內建 SVG 圖示 ---
        const Scale = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>);
        const CalculatorIcon = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/></svg>);
        const FileText = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>);
        const ChevronRight = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>);
        const Info = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>);
        const ArrowDownToLine = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>);
        const Trash2 = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const X = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);
        const Delete = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"/><line x1="18" x2="12" y1="9" y2="15"/><line x1="12" x2="18" y1="9" y2="15"/></svg>);
        const Plus = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
        const Minus = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>);

        // --- 輔助函式 ---
        const diffDaysInclusive = (d1, d2) => Math.floor((Date.UTC(d2.getFullYear(), d2.getMonth(), d2.getDate()) - Date.UTC(d1.getFullYear(), d1.getMonth(), d1.getDate())) / 86400000) + 1;
        const getPeriodEndInclusive = (startDate, addMonths) => {
            let targetMonth = startDate.getMonth() + addMonths;
            let targetYear = startDate.getFullYear() + Math.floor(targetMonth / 12);
            targetMonth = targetMonth % 12;
            if (targetMonth < 0) targetMonth += 12;
            let startDay = startDate.getDate();
            let maxDays = new Date(targetYear, targetMonth + 1, 0).getDate();
            if (startDay > maxDays) return new Date(targetYear, targetMonth, maxDays);
            let targetDate = new Date(targetYear, targetMonth, startDay);
            targetDate.setDate(targetDate.getDate() - 1);
            return targetDate;
        };

        const MOTION_EVENTS = [
            { group: '500元', fee: 500, items: ['聲請迴避', '聲請通知受擔保利益人行使權利', '聲請變換提存物或保證書', '對於法院書記官之處分提出異議', '聲請發支付命令', '聲請命假扣押、假處分、定暫時狀態處分之債權人於一定期間內起訴'] },
            { group: '1,000元', fee: 1000, items: ['聲請參加訴訟或駁回參加', '聲請命返還提存物或保證書', '聲請回復原狀', '對於司法事務官之處分提出異議', '聲請許可承當訴訟', '聲請許可為訴訟繫屬事實登記或撤銷許可登記裁定', '起訴前聲請證據保全', '依第484條第1項但書、第485條第1項但書、第486條第2項但書，提出異議', '聲請假扣押、假處分或撤銷假扣押、假處分裁定', '聲請公示催告或除權判決'] },
            { group: '3,000元', fee: 3000, items: ['聲請定暫時狀態處分或撤銷定暫時狀態處分裁定'] }
        ];

        function App() {
            const [mainCategory, setMainCategory] = useState('lawsuit'); 
            const [subCategory, setSubCategory] = useState('property'); 
            const [amountInput, setAmountInput] = useState('');
            const [instanceLevel, setInstanceLevel] = useState('1');
            const [selectedMotion, setSelectedMotion] = useState('');

            const [interestPrincipal, setInterestPrincipal] = useState('');
            const [interestRate, setInterestRate] = useState('');
            const [rateType, setRateType] = useState('annual'); 
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [showCalc, setShowCalc] = useState(false);
            const [calcDisplay, setCalcDisplay] = useState('0');
            const [calcPrevValue, setCalcPrevValue] = useState(null);
            const [calcOperator, setCalcOperator] = useState(null);
            const [calcWaiting, setCalcWaiting] = useState(false);

            const handleMainCategoryChange = (e) => {
                const val = e.target.value;
                setMainCategory(val);
                setAmountInput('');
                if(val === 'lawsuit') setSubCategory('property');
                if(val === 'motion') setSelectedMotion('');
                if(val === 'mediation') setSubCategory('property');
                if(val === 'execution') setSubCategory('property');
                if(val === 'appeal_retrial') setSubCategory('appeal'); 
            };

            const handleAmountChange = (e) => setAmountInput(e.target.value.replace(/\D/g, ''));
            const handlePrincipalChange = (e) => setInterestPrincipal(e.target.value.replace(/\D/g, ''));
            const handleRateChange = (e) => setInterestRate(e.target.value.replace(/[^0-9.]/g, '')); 

            const fillInputValue = () => {
                const val = String(Math.round(parseFloat(calcDisplay) || 0));
                if (mainCategory === 'interest') {
                    setInterestPrincipal(val);
                } else {
                    setAmountInput(val);
                }
            };

            const inputNum = (num) => {
                if (calcWaiting) { setCalcDisplay(String(num)); setCalcWaiting(false); } 
                else { setCalcDisplay(calcDisplay === '0' ? String(num) : calcDisplay + num); }
            };
            const inputDot = () => {
                if (calcWaiting) { setCalcDisplay('0.'); setCalcWaiting(false); } 
                else if (!calcDisplay.includes('.')) { setCalcDisplay(calcDisplay + '.'); }
            };
            const clearCalc = () => { setCalcDisplay('0'); setCalcPrevValue(null); setCalcOperator(null); setCalcWaiting(false); };
            const backspaceCalc = () => {
                if (calcWaiting) return;
                setCalcDisplay(prev => prev.length > 1 ? prev.slice(0, -1) : '0');
            };
            const operate = (op) => {
                const current = parseFloat(calcDisplay);
                if (calcPrevValue === null) { setCalcPrevValue(current); } 
                else if (calcOperator && !calcWaiting) {
                    let result = calcPrevValue;
                    if (calcOperator === '+') result += current;
                    if (calcOperator === '-') result -= current;
                    if (calcOperator === '×') result *= current;
                    if (calcOperator === '÷') result /= current;
                    result = parseFloat(result.toFixed(10)); 
                    setCalcDisplay(String(result)); setCalcPrevValue(result);
                }
                setCalcWaiting(true); setCalcOperator(op);
            };
            const calcEquals = () => {
                if (!calcOperator || calcPrevValue === null) return;
                const current = parseFloat(calcDisplay);
                let result = calcPrevValue;
                if (calcOperator === '+') result += current;
                if (calcOperator === '-') result -= current;
                if (calcOperator === '×') result *= current;
                if (calcOperator === '÷') result /= current;
                result = parseFloat(result.toFixed(10));
                setCalcDisplay(String(result)); setCalcPrevValue(null); setCalcOperator(null); setCalcWaiting(true);
            };

            const modifyCalculator = (amount, op) => {
                const current = parseFloat(calcDisplay) || 0;
                let result = current;
                if (op === '+') result += amount;
                if (op === '-') result -= amount;
                result = parseFloat(result.toFixed(10));
                setCalcDisplay(String(result));
                setCalcPrevValue(null);
                setCalcOperator(null);
                setCalcWaiting(true);
                setShowCalc(true); 
            };

            useEffect(() => {
                if (!showCalc) return;
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;
                    const key = e.key;
                    if (/[0-9]/.test(key)) inputNum(Number(key));
                    else if (key === '.') inputDot();
                    else if (key === '+' || key === '-') operate(key);
                    else if (key === '*' || key === 'x') operate('×');
                    else if (key === '/') operate('÷');
                    else if (key === 'Enter' || key === '=') { e.preventDefault(); calcEquals(); }
                    else if (key === 'Escape') clearCalc();
                    else if (key === 'Backspace') backspaceCalc();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [calcDisplay, calcWaiting, calcOperator, calcPrevValue, showCalc]);

            const calculateLawsuitFee = (amt, subCat, instLvl) => {
                let fee = 0; let details = [];
                if (subCat === 'non-property') {
                    fee = instLvl === '1' ? 4500 : 6750;
                    details.push(`非因財產權 (${instLvl === '1' ? '第一審' : '第二、三審'})：${fee.toLocaleString()}元`);
                } else if (subCat === 'property') {
                    if (amt === 0) return { fee: null, details: [] };
                    const isFirst = instLvl === '1';
                    const baseFee = isFirst ? 1500 : 2250;
                    if (amt <= 100000) {
                        fee = baseFee;
                        details.push(`10萬元以下基本費：${fee.toLocaleString()}元`);
                    } else {
                        fee = baseFee;
                        details.push(`10萬元以下基本費：${baseFee.toLocaleString()}元`);
                        const brackets = [
                            [100000, 1000000, 130, 195, '10萬~100萬'], [1000000, 10000000, 117, 175.5, '100萬~1000萬'],
                            [10000000, 100000000, 88, 132, '1000萬~1億'], [100000000, 1000000000, 77, 115.5, '1億~10億'],
                            [1000000000, Infinity, 66, 99, '10億以上']
                        ];
                        brackets.forEach(([min, max, rate1, rate2, label]) => {
                            if (amt > min) {
                                const applicableAmount = Math.min(amt, max) - min;
                                const units = Math.ceil(applicableAmount / 10000); 
                                const rate = isFirst ? rate1 : rate2;
                                const tierFee = units * rate;
                                fee += tierFee;
                                details.push(`逾${label}部分 (計 ${units} 萬)：${units} 萬 × ${rate}元 = ${tierFee.toLocaleString()}元`);
                            }
                        });
                        fee = Math.round(fee);
                    }
                }
                return { fee, details };
            };

            const calculationResult = useMemo(() => {
                const amount = parseInt(amountInput, 10) || 0;
                let fee = 0; let details = [];
                const parseLocalDate = (dateStr) => {
                    const [y, m, d] = dateStr.split('-');
                    return new Date(Number(y), Number(m) - 1, Number(d));
                };

                switch (mainCategory) {
                    case 'lawsuit':
                        const resLawsuit = calculateLawsuitFee(amount, subCategory, instanceLevel);
                        if(resLawsuit.fee === null) return null;
                        fee = resLawsuit.fee; details = resLawsuit.details;
                        break;

                    case 'appeal_retrial':
                        fee = 1500;
                        if (subCategory === 'appeal') {
                            details.push('抗告 / 再為抗告：1,500元');
                        } else if (subCategory === 'retrial_motion') {
                            details.push('聲請再審：1,500元');
                        } else if (subCategory === 'retrial_lawsuit') {
                            details.push('再審之訴 / 第三人撤銷之訴：1,500元');
                        }
                        break;

                    case 'interest':
                        if (!interestPrincipal || !interestRate || !startDate || !endDate) return null;
                        const p = parseFloat(interestPrincipal); const r = parseFloat(interestRate) / 100;
                        let sDate = parseLocalDate(startDate); let eDate = parseLocalDate(endDate);
                        if (sDate > eDate) return { error: '⚠️ 起算日不可晚於終止日' };

                        const twYearS = sDate.getFullYear() - 1911; const twYearE = eDate.getFullYear() - 1911;
                        details.push(`計算本金：${p.toLocaleString()} 元`);
                        details.push(`給付期間：民國 ${twYearS} 年 ${sDate.getMonth()+1} 月 ${sDate.getDate()} 日 至 民國 ${twYearE} 年 ${eDate.getMonth()+1} 月 ${eDate.getDate()} 日`);

                        if (rateType === 'annual') {
                            let fullYears = 0;
                            while (getPeriodEndInclusive(sDate, (fullYears + 1) * 12) <= eDate) fullYears++;
                            let partialBase = 0, partialDays = 0, yearDays = 0;
                            let currentStart = new Date(sDate);
                            if (fullYears > 0) {
                                currentStart = new Date(getPeriodEndInclusive(sDate, fullYears * 12));
                                currentStart.setDate(currentStart.getDate() + 1);
                            }
                            if (currentStart <= eDate) {
                                partialDays = diffDaysInclusive(currentStart, eDate);
                                yearDays = diffDaysInclusive(currentStart, getPeriodEndInclusive(currentStart, 12));
                                partialBase = partialDays / yearDays;
                            }
                            const totalBase = fullYears + partialBase;
                            const interest = p * totalBase * r;

                            details.push(`計息方式：年息 ${interestRate}%`);
                            if (fullYears > 0) details.push(`足年部分：${fullYears} 年`);
                            if (partialDays > 0) details.push(`不足年部分：${partialDays} 日 / ${yearDays} 日`);
                            
                            let baseFractionStr = fullYears > 0 && partialDays > 0 ? `${fullYears} 又 ${partialDays}/${yearDays}` : (partialDays > 0 ? `${partialDays}/${yearDays}` : `${fullYears}`);
                            details.push(`給付基數：${baseFractionStr} (約 ${totalBase.toFixed(6)})`);
                            details.push(`利息小計：${p.toLocaleString()} × ${baseFractionStr} × ${interestRate}% = ${Math.round(interest).toLocaleString()} 元`);
                            fee = p + Math.round(interest);
                            details.push(`----------------------------------------`);
                            details.push(`總計金額 (本金+利息)：${fee.toLocaleString()} 元`);
                        } else {
                            let fullMonths = 0;
                            while (getPeriodEndInclusive(sDate, fullMonths + 1) <= eDate) fullMonths++;
                            const interest = p * fullMonths * r;
                            details.push(`計息方式：月息 ${interestRate}%`);
                            details.push(`給付期間 (不足一月者不計)：共 ${fullMonths} 個月`);
                            details.push(`利息小計：${p.toLocaleString()} × ${fullMonths} × ${interestRate}% = ${Math.round(interest).toLocaleString()} 元`);
                            fee = p + Math.round(interest);
                            details.push(`----------------------------------------`);
                            details.push(`總計金額 (本金+利息)：${fee.toLocaleString()} 元`);
                        }
                        break;

                    case 'motion':
                        if (!selectedMotion) return null;
                        const matchedMotion = MOTION_EVENTS.flatMap(g => g.items.map(item => ({ item, fee: g.fee }))).find(m => m.item === selectedMotion);
                        if (matchedMotion) {
                            fee = matchedMotion.fee;
                            details.push(`聲請事件：${selectedMotion}`);
                            details.push(`固定規費：${fee.toLocaleString()} 元`);
                        }
                        break;

                    case 'mediation':
                        if (subCategory === 'non-property') {
                            fee = 0; details.push('非財產權事件聲請調解：免徵');
                        } else {
                            if (amountInput === '') return null;
                            if (amount < 100000) { fee = 0; details.push('未滿10萬元：免徵'); }
                            else if (amount < 1000000) { fee = 1000; details.push('10萬元以上～未滿100萬元：1,000元'); }
                            else if (amount < 5000000) { fee = 2000; details.push('100萬元以上～未滿500萬元：2,000元'); }
                            else if (amount < 10000000) { fee = 3000; details.push('500萬元以上～未滿1000萬元：3,000元'); }
                            else { fee = 5000; details.push('1000萬元以上：5,000元'); }
                        }
                        break;

                    case 'execution':
                        if (subCategory === 'non-property') {
                            fee = 3000; details.push('非財產權案件執行費：3,000元');
                        } else if (subCategory === 'cert') {
                            fee = 1000; details.push('依強制執行法第27條第2項逕行發給債權憑證：1,000元 (依規定低於1千者依計算收)');
                        } else {
                            if (amountInput === '') return null;
                            if (amount < 5000) { fee = 0; details.push('未滿5,000元：免徵'); } 
                            else {
                                const units = Math.ceil(amount / 100); 
                                fee = Math.round(units * 0.8);
                                details.push(`執行標的金額：${amount.toLocaleString()}元`);
                                details.push(`計算基準 (每百元0.8元，不滿百元以百元計)：計 ${units} 百元`);
                                details.push(`${units} × 0.8 = ${fee.toLocaleString()}元`);
                            }
                        }
                        break;
                }

                return { total: fee, details };
            }, [mainCategory, subCategory, amountInput, instanceLevel, selectedMotion, interestPrincipal, interestRate, rateType, startDate, endDate]);

            // --- 樣式常量 (優化手機端體驗) ---
            const labelClass = "block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5";
            // 輸入框預設字體改為 text-base (16px) 防止 iOS 自動縮放，電腦版可用 sm (14px)
            const inputClass = "w-full rounded-md border border-slate-300 bg-white p-3 text-base sm:text-sm text-slate-800 shadow-sm focus:border-slate-800 focus:ring-1 focus:ring-slate-800 outline-none transition-shadow";

            return (
                <div className="min-h-screen pb-28 sm:pb-24 px-4 sm:px-6 lg:px-8 flex justify-center">
                    
                    <div className="w-full max-w-3xl space-y-6 sm:space-y-8 pt-6 sm:pt-10">
                        {/* 標頭 */}
                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 border-b border-slate-200 pb-4 sm:pb-6">
                            <div className="p-3.5 bg-slate-800 rounded-lg text-white shadow-sm flex-shrink-0">
                                <Scale className="w-6 h-6 sm:w-7 sm:h-7" />
                            </div>
                            <div>
                                <h1 className="text-xl sm:text-2xl font-bold text-slate-900 tracking-tight">裁判費與利息計算</h1>
                            </div>
                        </div>

                        {/* 參數設定區 */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 sm:p-8">
                            <h2 className="text-base sm:text-lg font-bold text-slate-800 mb-5 sm:mb-6 flex items-center gap-2 sm:gap-3 border-b border-slate-100 pb-3">
                                <span className="bg-slate-800 text-white w-5 h-5 sm:w-6 sm:h-6 rounded-md flex items-center justify-center text-xs font-bold shadow-sm">1</span>
                                案件設定
                            </h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                                {/* 計算類別 */}
                                <div className="md:col-span-2">
                                    <label className={labelClass}>計算類別</label>
                                    <select value={mainCategory} onChange={handleMainCategoryChange} className={`${inputClass} font-medium`}>
                                        <option value="lawsuit">起訴 / 上訴</option>
                                        <option value="appeal_retrial">抗告 / 再審 / 撤銷之訴</option>
                                        <option value="motion">聲請事件</option>
                                        <option value="mediation">聲請調解</option>
                                        <option value="execution">聲請強制執行</option>
                                        <option value="interest">利息計算</option>
                                    </select>
                                </div>

                                {/* 案件種類 */}
                                {mainCategory !== 'motion' && mainCategory !== 'interest' && (
                                    <div className={mainCategory === 'appeal_retrial' ? "md:col-span-2" : ""}>
                                        <label className={labelClass}>案件種類</label>
                                        <select value={subCategory} onChange={(e) => setSubCategory(e.target.value)} className={inputClass}>
                                            {mainCategory === 'lawsuit' && (
                                                <><option value="property">因財產權</option><option value="non-property">非因財產權</option></>
                                            )}
                                            {mainCategory === 'appeal_retrial' && (
                                                <>
                                                    <option value="appeal">抗告 / 再為抗告</option>
                                                    <option value="retrial_motion">聲請再審</option>
                                                    <option value="retrial_lawsuit">再審之訴 / 第三人撤銷之訴</option>
                                                </>
                                            )}
                                            {mainCategory === 'mediation' && (
                                                <><option value="property">財產權事件</option><option value="non-property">非財產權事件</option></>
                                            )}
                                            {mainCategory === 'execution' && (
                                                <><option value="property">財產權案件</option><option value="non-property">非財產權案件</option><option value="cert">逕行發給債權憑證</option></>
                                            )}
                                        </select>
                                    </div>
                                )}

                                {/* 聲請事件種類 */}
                                {mainCategory === 'motion' && (
                                    <div className="md:col-span-2">
                                        <label className={labelClass}>聲請事件種類</label>
                                        <select value={selectedMotion} onChange={(e) => setSelectedMotion(e.target.value)} className={inputClass}>
                                            <option value="" disabled>-- 請選擇 --</option>
                                            {MOTION_EVENTS.map((group, idx) => (
                                                <optgroup key={idx} label={`【${group.group}】`}>
                                                    {group.items.map((item, i) => <option key={i} value={item}>{item}</option>)}
                                                </optgroup>
                                            ))}
                                        </select>
                                    </div>
                                )}

                                {/* 管轄審級 */}
                                {mainCategory === 'lawsuit' && (
                                    <div>
                                        <label className={labelClass}>管轄審級</label>
                                        <select value={instanceLevel} onChange={(e) => setInstanceLevel(e.target.value)} className={inputClass}>
                                            <option value="1">第一審</option>
                                            <option value="23">第二、三審</option>
                                        </select>
                                    </div>
                                )}

                                {/* 標的金額 */}
                                {((mainCategory === 'lawsuit' && subCategory === 'property') || 
                                  (mainCategory === 'mediation' && subCategory === 'property') ||
                                  (mainCategory === 'execution' && subCategory === 'property')) && (
                                    <div className="md:col-span-2">
                                        <label className={labelClass}>標的金額 (新台幣)</label>
                                        <div className="relative">
                                            <input type="text" value={amountInput} onChange={handleAmountChange} placeholder="請輸入金額..." className={`${inputClass} pl-11`} />
                                            <span className="absolute left-3.5 top-3.5 text-slate-400 text-sm sm:text-sm font-semibold">NT$</span>
                                        </div>
                                    </div>
                                )}

                                {/* 利息專用欄位 */}
                                {mainCategory === 'interest' && (
                                    <>
                                        <div className="md:col-span-2">
                                            <label className={labelClass}>計算本金 (新台幣)</label>
                                            <div className="relative">
                                                <input type="text" value={interestPrincipal} onChange={handlePrincipalChange} placeholder="請輸入本金..." className={`${inputClass} pl-11`} />
                                                <span className="absolute left-3.5 top-3.5 text-slate-400 text-sm font-semibold">NT$</span>
                                            </div>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className={labelClass}>利率 (%)</label>
                                            <div className="relative flex shadow-sm rounded-md">
                                                <input type="text" value={interestRate} onChange={handleRateChange} placeholder="例如: 5" className={`w-full border border-slate-300 rounded-l-md p-3 text-base sm:text-sm focus:border-slate-800 focus:ring-1 focus:ring-slate-800 outline-none`} />
                                                <select value={rateType} onChange={(e) => setRateType(e.target.value)} className={`border border-l-0 border-slate-300 bg-slate-50 rounded-r-md p-3 text-base sm:text-sm text-slate-700 outline-none min-w-[80px]`}>
                                                    <option value="annual">年息</option><option value="monthly">月息</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className={labelClass}>起算日 (均計入)</label>
                                            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className={inputClass} />
                                        </div>
                                        <div>
                                            <label className={labelClass}>終止日 (均計入)</label>
                                            <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className={inputClass} />
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* 計算結果區塊 */}
                        <div className="bg-slate-800 text-white rounded-xl shadow-lg p-5 sm:p-8 relative overflow-hidden border border-slate-700">
                            <CalculatorIcon className="absolute -right-6 -bottom-6 w-32 h-32 sm:w-40 sm:h-40 text-slate-700 opacity-30 pointer-events-none" />
                            <h2 className="text-xs sm:text-sm font-semibold text-slate-300 mb-3 tracking-wide uppercase">
                                {mainCategory === 'interest' ? '給付總額試算' : '應徵收裁判 / 規費'}
                            </h2>
                            
                            {calculationResult ? (
                                calculationResult.error ? (
                                    <div className="py-4 text-center text-red-400 font-medium relative z-10">{calculationResult.error}</div>
                                ) : (
                                    <div className="relative z-10">
                                        <div className="text-3xl sm:text-4xl md:text-5xl font-mono font-bold text-white mb-6 flex items-baseline gap-2">
                                            {calculationResult.total.toLocaleString()}
                                            <span className="text-sm sm:text-base font-sans font-normal text-slate-400 tracking-normal">TWD</span>
                                        </div>
                                        
                                        {/* 手機版：按鈕改為上下排列，確保不擁擠 */}
                                        <div className="flex flex-col sm:flex-row gap-3 mb-6 sm:mb-8">
                                            <button onClick={() => modifyCalculator(calculationResult.total, '+')} className="w-full sm:w-auto flex justify-center items-center gap-2 px-5 py-3 sm:py-2.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-sm font-medium rounded-md transition shadow-sm">
                                                <Plus className="w-4 h-4" /> 加入小算盤
                                            </button>
                                            <button onClick={() => modifyCalculator(calculationResult.total, '-')} className="w-full sm:w-auto flex justify-center items-center gap-2 px-5 py-3 sm:py-2.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-sm font-medium rounded-md transition shadow-sm">
                                                <Minus className="w-4 h-4" /> 從小算盤扣除
                                            </button>
                                        </div>
                                        
                                        <div className="bg-slate-900/50 rounded-md p-4 sm:p-5 border border-slate-700/50">
                                            <h3 className="text-[11px] sm:text-xs font-semibold text-slate-400 mb-3 flex items-center gap-1.5 uppercase tracking-wider">
                                                <Info className="w-4 h-4" /> 計算明細
                                            </h3>
                                            <ul className="space-y-2 text-xs sm:text-sm text-slate-300 font-mono break-all sm:break-normal">
                                                {calculationResult.details.map((detail, idx) => (
                                                    <li key={idx} className="flex items-start gap-2">
                                                        <ChevronRight className="w-3.5 h-3.5 sm:w-4 sm:h-4 mt-0.5 text-slate-500 flex-shrink-0" />
                                                        <span className="leading-relaxed">{detail}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                )
                            ) : (
                                <div className="py-10 text-center text-slate-500 relative z-10">
                                    <FileText className="w-10 h-10 mx-auto mb-3 opacity-40" />
                                    <p className="text-sm">請完成上方設定以檢視結果</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 懸浮按鈕 (開啟小算盤) */}
                    <button 
                        onClick={() => setShowCalc(!showCalc)}
                        className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-40 bg-slate-800 text-white p-3.5 sm:p-4 rounded-full shadow-lg hover:bg-slate-700 border border-slate-700 transition-all flex items-center gap-2 group"
                    >
                        <CalculatorIcon className="w-5 h-5 sm:w-6 sm:h-6" />
                        <span className="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-300 font-medium text-xs sm:text-sm tracking-wide">小算盤 (支援鍵盤)</span>
                    </button>

                    {/* 彈出式小算盤 面板 (自適應寬度) */}
                    <div className={`fixed bottom-20 right-4 sm:bottom-24 sm:right-6 z-50 w-[calc(100vw-32px)] sm:w-[340px] bg-slate-900 rounded-2xl shadow-2xl p-4 sm:p-5 text-white border border-slate-700 transition-all duration-300 origin-bottom-right ${showCalc ? 'scale-100 opacity-100' : 'scale-0 opacity-0 pointer-events-none'}`}>
                        <div className="flex items-center justify-between text-slate-400 mb-4 px-1 border-b border-slate-800 pb-3">
                            <div className="flex items-center gap-2">
                                <CalculatorIcon className="w-4 h-4" /><span className="font-medium text-[11px] sm:text-xs tracking-wide">小算盤 (支援鍵盤)</span>
                            </div>
                            <button onClick={() => setShowCalc(false)} className="hover:text-white transition-colors p-1 -mr-1"><X className="w-5 h-5"/></button>
                        </div>
                        
                        {/* 算盤螢幕 */}
                        <div className="bg-slate-950 rounded-lg p-4 text-right mb-3 border border-slate-800 min-h-[80px] sm:min-h-[90px] flex flex-col justify-end shadow-inner">
                            {calcPrevValue !== null && calcOperator && (
                                <div className="text-slate-500 text-xs sm:text-sm mb-1 font-mono">{calcPrevValue} {calcOperator} {calcWaiting ? '' : calcDisplay}</div>
                            )}
                            <div className="text-3xl sm:text-4xl font-mono tracking-wider overflow-hidden text-ellipsis truncate">{calcDisplay}</div>
                        </div>

                        {/* 統一填入輸入欄位 */}
                        <div className="mb-4 border-b border-slate-800 pb-4">
                            <button onClick={fillInputValue} className="w-full flex justify-center items-center gap-1.5 py-3 sm:py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 hover:text-white text-sm font-semibold rounded-lg transition-colors">
                                <ArrowDownToLine className="w-4 h-4" /> 填入至輸入欄位
                            </button>
                        </div>

                        <div className="grid grid-cols-4 gap-2 font-mono text-lg">
                            <button onClick={clearCalc} className="col-span-2 bg-slate-800 text-red-400 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition border border-slate-700">AC</button>
                            <button onClick={backspaceCalc} className="bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition flex justify-center items-center border border-slate-700"><Delete className="w-4 h-4 sm:w-5 sm:h-5"/></button>
                            <button onClick={() => operate('÷')} className={`bg-slate-800 text-blue-400 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition border border-slate-700 ${calcOperator === '÷' && calcWaiting ? 'ring-1 ring-blue-500' : ''}`}>÷</button>
                            
                            {[7, 8, 9].map(num => <button key={num} onClick={() => inputNum(num)} className="bg-slate-800 hover:bg-slate-700 rounded-lg py-3 sm:py-3 transition">{num}</button>)}
                            <button onClick={() => operate('×')} className={`bg-slate-800 text-blue-400 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition border border-slate-700 ${calcOperator === '×' && calcWaiting ? 'ring-1 ring-blue-500' : ''}`}>×</button>
                            
                            {[4, 5, 6].map(num => <button key={num} onClick={() => inputNum(num)} className="bg-slate-800 hover:bg-slate-700 rounded-lg py-3 sm:py-3 transition">{num}</button>)}
                            <button onClick={() => operate('-')} className={`bg-slate-800 text-blue-400 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition border border-slate-700 ${calcOperator === '-' && calcWaiting ? 'ring-1 ring-blue-500' : ''}`}>-</button>
                            
                            {[1, 2, 3].map(num => <button key={num} onClick={() => inputNum(num)} className="bg-slate-800 hover:bg-slate-700 rounded-lg py-3 sm:py-3 transition">{num}</button>)}
                            <button onClick={() => operate('+')} className={`bg-slate-800 text-blue-400 hover:bg-slate-700 rounded-lg py-3 sm:py-3 font-semibold transition border border-slate-700 ${calcOperator === '+' && calcWaiting ? 'ring-1 ring-blue-500' : ''}`}>+</button>
                            
                            <button onClick={() => inputNum(0)} className="col-span-2 bg-slate-800 hover:bg-slate-700 rounded-lg py-3 sm:py-3 transition">0</button>
                            <button onClick={inputDot} className="bg-slate-800 hover:bg-slate-700 rounded-lg py-3 sm:py-3 transition font-bold">.</button>
                            <button onClick={calcEquals} className="bg-blue-600 hover:bg-blue-500 text-white rounded-lg py-3 sm:py-3 font-bold transition flex justify-center items-center shadow-sm">=</button>
                        </div>
                    </div>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
